{% extends "base.html" %}

{% block content %}

<!DOCTYPE html>
<html>

<head>

<title>Checkout</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Checkout</h2>

<table class="table">

<tr>

<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>

</tr>

{% for item in cart_items %}

<tr>

<td>{{ item.product.name }}</td>
<td>{{ item.product.price }}</td>
<td>{{ item.quantity }}</td>
<td>₹ {{ item.total|floatformat:2 }}</td>

</tr>

{% endfor %}

</table>
<a href="/orders/place-order/" class="btn btn-success">Place Order</a>

</div>

</body>

</html>
{% endblock %}
