{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<h2>Your Orders</h2>

<table class="table table-striped">

<tr>
<th>Product</th>
<th>Quantity</th>
<th>Price</th>
<th>Date</th>
</tr>

{% for order in orders %}

<tr>
<td>{{ order.product.name }}</td>
<td>{{ order.quantity }}</td>
<td>₹ {{ order.price }}</td>
<td>{{ order.created_at }}</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
